name: refresh_photon_image

on:
  workflow_dispatch:
  schedule:
    # Daily at 02:00 UTC
    - cron: "0 2 * * *"

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_PASSWORD }}

      - name: Build goharbor/photon:5.0
        run: |
          docker build \
            -f make/photon/common/Dockerfile \
            -t goharbor/photon:5.0 \
            .

      - name: Push goharbor/photon:5.0
        run: docker push goharbor/photon:5.0
