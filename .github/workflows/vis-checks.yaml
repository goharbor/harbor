name: "Checks"
on:
  pull_request:
    branches:
      - main

permissions: {}

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      modules: ${{ steps.detect.outputs.modules }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Detect changed Go modules
        id: detect
        uses: ./.github/actions/detect-changes
        with:
          file-pattern: 'go.mod'

  go-checks:
    needs: detect-changes
    if: needs.detect-changes.outputs.modules != '[]'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        directory: ${{ fromJSON(needs.detect-changes.outputs.modules) }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Go
        uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v5.5.0
        with:
          go-version-file: ${{ matrix.directory }}/go.mod
          check-latest: false

      - name: Download and verify modules
        working-directory: ${{ matrix.directory }}
        run: |
          go mod download
          go mod verify

      - name: govulncheck
        uses: golang/govulncheck-action@b625fbe08f3bccbe446d94fbf87fcc875a4f50ee # v1.0.4
        with:
          work-dir: ${{ matrix.directory }}

      - name: golangci-lint
        uses: golangci/golangci-lint-action@1e7e51e771db61008b38414a730f564565cf7c20 # v9.2.0
        with:
          version: v2.8.0
          working-directory: ${{ matrix.directory }}
          skip-cache: true

      - name: Run tests
        working-directory: ${{ matrix.directory }}
        run: go test ./... -short

      - name: Check formatting and tidiness
        working-directory: ${{ matrix.directory }}
        run: |
          go mod tidy
          go fmt ./...
          git restore go.sum
      - name: Verify no uncommitted changes
        run: git diff-files --quiet --ignore-submodules
