## Configuration file of Harbor

#The IP address or hostname to access admin UI and registry service.
#DO NOT use localhost or 127.0.0.1, because Harbor needs to be accessed by external clients.
hostname = 172.17.0.3

## Hydra config
hydra:
  adminServer: ""

#The protocol for accessing the Harbor UI and token/notification endpoint.
#The possible values are http or https. It MUST be paired with the port attribute.
#If https is enabled, the default HTTPS port 443 is used unless you set a different port.
# Default is http. Uncomment this attribute if you want to use HTTPS.
ui_url_protocol = https

#Maximum number of job workers in job service
max_job_workers = 10

#Determine whether or not to generate certificate for the registry's token.
#If the value is on, the prepare script will generate new root ca and private key
#for generating token to access the image repositories. If the value is off the key/cert
#will be generated by external process and the docker/notary client should be configured
#properly to retrieve the related key/cert to access the repositories.
#Possible values are on and off. Default is on.
token_expiration = 30

#The maximum amount of time a token issued at ui_token_expiration is valid for accessing a repository.
#This option overrides the value of REGISTRY_TOKEN_EXPIRATION environment variable.
#If this option is not set, default is 30.
project_creation_restriction = everyone

#Determine whether the job service should verify the ssl cert when it connects to a remote registry.
#Set this flag to off when the remote registry uses a self-signed or untrusted certificate.
#Defaults to on. Uncomment and set to off to disable verification.
verify_remote_cert = on

#The auth mode of Harbor. The possible values are {{.AuthModes}}.
# Note: to enable Kerberos, the user should create a service account first.
auth_mode = db_auth

#NOTES: PostgreSQL GIS is not supported, because the GIS SQLALCHEMY type
#       is not correctly mapped by SQLAlchemy. However, you can still choose to install the standard
#       WITHOUT GIS support, and also you can install a foreign data wrapper (FDW)
#       extension later by your own to support it!

## Database
database:
  ## Use the following config to set the database of Harbor
  ## Postgres
  type: postgresql
  ssl_mode: disable
  host: postgresql
  port: 5432
  db_name: registry
  username: postgres
  password: root123
  ## Mysql
  # Comment out type, host, port, db_name, username and password to use existing local mysql instance.
  # type: mysql
  # host: mysql
  # port: 3306
  # db_name: registry
  # username: root
  # password: root123
  # ssl_mode: false
  # max_idle_conns: 2
  # max_open_conns: 0
  max_idle_conns: 100
  max_open_conns: 900

###############################################################################
## Redis section
###############################################################################
redis:
  # db_index [0~15], the redis db index is heavily used at local redis \
  db_index: 1
  host: redis
  port: 6379
  password:
  namespace: harbor
  metadata_namespace: harbor
  registry_db_index: 0

###############################################################################
## UAA section
###############################################################################
uaa:
  client_id: id-acme
  client_secret: secret-acme
  endpoint: https://uaa.mydomain.com
  certificate_path: /path/of/certificate
  skip_ssl_verification: false
  username: username
  password: password

###############################################################################
## Global Proxy Config
###############################################################################
proxy:
  http_proxy:
  https_proxy:
  no_proxy:
  components:
    - core
    - jobservice
    - trivy

###############################################################################
## Metric
###############################################################################
metric:
  enabled: false
  port: 9090
  path: /metrics

###############################################################################
## Jobservice Config
###############################################################################

# Maximum number of job workers in job service
job_service:
  max_job_workers: 10
  ui_serve_static: true
  # configs for max connection idle time, max connection open time to a redis instance
  redis_pool:
    # redis connection idle time in seconds
    idle_timeout_second: 5
    # redis connection max life time in seconds
    max_active_conns: 100
    conn_wait_timeout_second: 3

###############################################################################
## Notification
###############################################################################
notification:
  webhook_url_max_retry_count: 10

###############################################################################
## Log section
###############################################################################
log:
  # options sample:
  #   freebsd: "facility LOCAL7"
  # empty is omitted
  accesslog: # we can omit this to disable access log
  level: info
  local:
    rotate_count: 50
    rotate_size: 200M
    location: /var/log/harbor

###############################################################################
## Purge as well as Scan
###############################################################################
purge:
  # Note: if externalUrl is specified, the download url will be the specified externalUrl
  artifacts:
    enable: true
    # Specify how many days to retain deleted artifact
    retention_day: 10

###############################################################################
## Trivy Configuration
###############################################################################
trivy:
  # ignoreUnfixed The flag to display only fixed vulnerabilities
  ignore_unfixed: false
  # ignoreSeverity The flag to display vulnerabilities of specified severity
  ignore_severity: ""
  # insecure The flag to skip verifying registry certificate
  insecure: false
  # skipUpdate The flag to enable or disable Trivy DB downloads from GitHub
  #
  # You might want to enable this flag in test or CI/CD environments to avoid GitHub rate limiting issues.
  # If the flag is enabled, you have to manually download the `trivy-offline.tar.gz` file and mount it
  # in the `/home/scanner/.cache/trivy/db` path.
  skip_update: false
  #
  # skipJavaDBUpdate The flag to enable or disable the Java DB download service from the official database.
  # Compared to `skip_update` flag, this flag has the effect on the Java plugin, so this flag is enabled you have to
  # inject the java-db file by mounting the Java DB file in `/home/scanner/.cache/trivy/java-db/trivy-java.db` path
  # Please refer to the images section part in docker-compose file for instructions on how to bind the Java DB file
  skip_java_db_update: false

cache:
  enable: false
  expire_hours: 24

gdpr:
  delete_user_on_delete_member: false
