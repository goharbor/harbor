<span class="container">
    @if (isError()) {
    <cds-icon class="error" shape="error-standard"></cds-icon>
    } @if (isWarning()) {
    <cds-icon size="20" class="warning" shape="exclamation-triangle"></cds-icon>
    } @if (isSuccess()) {
    <cds-icon class="success" shape="success-standard"></cds-icon>
    }
    <span class="ml-5px">{{ timeRemain | translate }}</span>
</span>
