version: "2"
linters:
  default: none
  enable:
    - bodyclose
    - dupl
    - errcheck
    - goheader
    - gosec
    - govet
    - ineffassign
    - misspell
    - revive
    - staticcheck
    - usestdlibvars
    - whitespace
  settings:
    goheader:
      template-path: copyright.tmpl
    dupl:
      threshold: 300
    gosec:
      excludes:
        - G101
        - G110
        - G112
        - G114
        - G115
        - G306
        - G402
        - G404
    misspell:
      locale: US,UK
    staticcheck:
      checks:
        - ST1019
  exclusions:
    generated: lax
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
    rules:
      - linters:
          - revive
        text: "var-naming: avoid meaningless package names"
        path: "(common/|core/utils/|core/api/|jobservice/api/|jobservice/common/utils/|registryctl/api/|pkg/permission/types/|pkg/quota/types/|server/middleware/util/|server/registry/util/|pkg/reg/util/|controller/event/handler/util/)"
      # TODO: Fix package naming - these packages conflict with Go stdlib
      - linters:
          - revive
        text: "var-naming: avoid package names that conflict with Go standard library package names"
        path: "(common/http/|lib/errors/|lib/http/)"
      # Legitimate uses of reflect.Ptr - issue #23199
      - linters:
          - govet
        text: "inline: Constant reflect.Ptr should be inlined"
        path: "(server/registry/manifest\\.go|server/middleware/blob/)"
      # Intentional credential marshaling in API clients - issue #23199
      - linters:
          - gosec
        text: "G117: Marshaled struct field.*matches secret pattern"
        path: "server/(registry|middleware/blob)/"
      # Intentional SSRF for registry client HTTP requests - issue #23199
      - linters:
          - gosec
        text: "G704: SSRF via taint analysis"
        path: "server/(registry|middleware/blob)/"
      # Intentional use of context.Background for transaction isolation - issue #18900
      - linters:
          - gosec
        text: "G118: Goroutine uses context.Background/TODO while request-scoped context is available"
        path: "controller/replication/execution.go"
    paths:
      - third_party$
      - builtin$
      - examples$
      - .*_test\.go
      - .*test\.go
      - testing
      - src/jobservice/mgt/mock_manager.go
formatters:
  enable:
    - gofmt
    - goimports
  settings:
    gofmt:
      simplify: false
    goimports:
      local-prefixes:
        - github.com/goharbor/harbor
  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
      - examples$
      - .*_test\.go
      - .*test\.go
      - testing
      - src/jobservice/mgt/mock_manager.go
